<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>الورقة الذكية</title>
    <link rel="icon" type="image/png" href="https://karimx3o.github.io/pressingApp2/karim.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" type="text/css" media="all" />

    <style>
      /* ===== Modal الموعد ===== */
      #pickupModal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        z-index: 999;
        align-items: flex-end;
        justify-content: center;
      }
      #pickupModal.open { display: flex; }

      .modal-box {
        background: #fff;
        border-radius: 20px 20px 0 0;
        padding: 20px 16px 28px;
        width: 100%;
        max-width: 460px;
        animation: slideUp 0.28s ease;
        font-family: 'Cairo', sans-serif;
      }
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
      }
      .modal-handle {
        width: 36px; height: 4px;
        background: #ddd; border-radius: 4px;
        margin: 0 auto 14px;
      }
      .modal-title {
        text-align: center;
        font-size: 1rem;
        font-weight: 800;
        color: #1a2530;
        margin-bottom: 14px;
      }
      .modal-label {
        font-size: 0.78rem;
        color: #6b7f8f;
        text-align: center;
        margin-bottom: 8px;
      }

      /* أزرار الأيام السريعة */
      #quickDaysBtns {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-bottom: 14px;
      }
      .qday-btn {
        padding: 7px 14px;
        border: 2px solid #d0e8f0;
        border-radius: 20px;
        background: white;
        color: #1a2530;
        font-family: 'Cairo', sans-serif;
        font-size: 0.8rem;
        font-weight: 700;
        cursor: pointer;
      }
      .qday-btn.selected {
        background: #1a6b8a;
        color: white;
        border-color: #1a6b8a;
      }

      /* حقل التاريخ */
      #customDate {
        width: 100%;
        padding: 10px;
        border: 2px solid #d0e8f0;
        border-radius: 12px;
        font-family: 'Cairo', sans-serif;
        font-size: 0.92rem;
        text-align: center;
        color: #1a2530;
        margin-bottom: 16px;
        outline: none;
      }

      /* أزرار الـ modal */
      .modal-actions {
        display: flex;
        gap: 10px;
      }
      .btn-cancel-modal {
        flex: 1;
        padding: 11px;
        border: 2px solid #d0e8f0;
        border-radius: 12px;
        background: white;
        color: #6b7f8f;
        font-family: 'Cairo', sans-serif;
        font-size: 0.88rem;
        font-weight: 700;
        cursor: pointer;
      }
      .btn-confirm-modal {
        flex: 2;
        padding: 11px;
        border: none;
        border-radius: 12px;
        background: #1a6b8a;
        color: white;
        font-family: 'Cairo', sans-serif;
        font-size: 0.88rem;
        font-weight: 900;
        cursor: pointer;
      }

      /* ===== شريط الموعد ===== */
      #pickupBanner {
        display: none;
        align-items: center;
        justify-content: space-between;
        background: #e67e22;
        color: white;
        border-radius: 10px;
        padding: 9px 13px;
        margin-top: 8px;
        font-family: 'Cairo', sans-serif;
        font-size: 0.84rem;
        font-weight: 700;
      }
      #pickupBanner button {
        background: rgba(255,255,255,0.25);
        border: none;
        border-radius: 8px;
        color: white;
        padding: 3px 9px;
        font-family: 'Cairo', sans-serif;
        font-size: 0.75rem;
        cursor: pointer;
      }

      /* ===== زر الموعد ===== */
      #btn-pickup-date {
        background: #e67e22;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 9px 14px;
        font-family: 'Cairo', sans-serif;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        margin-top: 6px;
        width: 100%;
      }

      /* ===== زر صفحة المواعيد ===== */
      #btn-pickup-page {
        background: #1a6b8a;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 9px 14px;
        font-family: 'Cairo', sans-serif;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
      }
    </style>
  </head>

  <body>
    <!-- الأزرار العلوية -->
    <div id="hiding">
      <button onclick="showReceipts()" id="click-btn">
        <img src="images/file.png" alt="" />
        عرض الوصولات
      </button>

      <button onclick="showPickup()" id="btn-pickup-page">
        📅 المواعيد
      </button>

      <button onclick="showRecei()" id="click-btn"
        style="width:50px;height:50px;border-radius:50px;display:flex;justify-content:center;align-items:center;">
        <img src="images/cog.png" alt="" style="width:35px;height:35px" />
      </button>

      <button onclick="stats()" id="click-btn"
        style="width:50px;height:50px;border-radius:50px;display:flex;justify-content:center;align-items:center;">
        <img src="images/cog1.png" alt="" style="width:35px;height:35px" />
      </button>
    </div>

    <!-- الصفحة -->
    <div class="container">
      <!-- الجوز 1 -->
      <div id="aljoz1">
        <div class="info-row">
          <div>📅 التاريخ: <span id="todayDate"></span></div>
          <div id="ido">🆔 رقم الوصل: <span id="receiptId">----</span></div>
        </div>

        <div id="clin" style="display:flex;justify-content:space-between">
          <input type="tel" id="whatsappNumber" placeholder="أدخل رقم واتساب" />
          <input type="text" id="nameclione" placeholder="أدخل اسم الزبون" />
        </div>

        <textarea id="output" placeholder="الملابس المختارة..." readonly></textarea>

        <!-- ← زر تحديد الموعد -->
        <button id="btn-pickup-date" onclick="openPickupModal()">
          📅 حدد موعد الاستلام
        </button>

        <!-- ← شريط الموعد المختار -->
        <div id="pickupBanner">
          <span id="bannerText">📅 موعد الاستلام: —</span>
          <button onclick="clearPickup()">✕ حذف</button>
        </div>

        <div class="options">
          <label><input type="checkbox" id="fastWash" /> غير مدفوع</label>
          <label><input type="checkbox" id="paid" /> تم الدفع</label>
        </div>

        <div class="actions">
          <button class="clear" onclick="clearAll()">مسح الكل</button>
          <button class="print" onclick="sendToWhatsapp()">📲 إرسال واتساب</button>
        </div>

        <div class="total" id="total">المجموع: 0 درهم</div>
      </div>

      <!-- الجوز 2 -->
      <div id="aljoz2">
        <div class="tabs">
          <div class="tab active" onclick="showCategory('m')">التحداد</div>
          <div class="tab" onclick="showCategory('s')">🧼 التصبين+التحداد</div>
          <div class="tab" onclick="showCategory('sb')">🟣الصباغة</div>
        </div>

        <div class="numbers">
          <button onclick="selectNumber(1)">1</button>
          <button onclick="selectNumber(2)">2</button>
          <button onclick="selectNumber(3)">3</button>
          <button onclick="selectNumber(4)">4</button>
          <button onclick="selectNumber(5)">5</button>
          <button onclick="selectNumber(6)">6</button>
          <button onclick="selectNumber(7)">7</button>
          <button onclick="selectNumber(8)">8</button>
          <button onclick="selectNumber(9)">9</button>
        </div>

        <div class="items" id="itemsContainer"></div>

        <button onclick="addNewItem()" style="margin:10px;padding:5px 10px;font-size:18px;border-radius:8px">➕</button>
        <button onclick="editItemPrice()" style="margin:10px;padding:5px 10px;font-size:18px;border-radius:8px">✏️</button>
      </div>
    </div>

    <!-- قائمة الوصولات -->
    <div id="receiptsList" style="margin:20px;padding:10px;background:#eee;border-radius:10px;display:none;">
      <h3>📜 قائمة الوصولات السابقة:</h3>
      <ul id="receiptsUl" style="list-style:none;padding:0"></ul>
    </div>

    <!-- ===== Modal تحديد الموعد ===== -->
    <div id="pickupModal">
      <div class="modal-box">
        <div class="modal-handle"></div>
        <div class="modal-title">📅 موعد استلام الملابس</div>

        <p class="modal-label">اختر سريعًا</p>
        <div id="quickDaysBtns"></div>

        <p class="modal-label">أو اختر تاريخًا</p>
        <input type="date" id="customDate" />

        <div class="modal-actions">
          <button class="btn-cancel-modal" onclick="closePickupModal()">إلغاء</button>
          <button class="btn-confirm-modal" onclick="confirmPickup()">✅ تأكيد الموعد</button>
        </div>
      </div>
    </div>

    <script>
      function showR() { window.location.href = "ind2.html"; }
    </script>
    <script src="db.js"></script>
    <script src="script.js"></script>
  </body>
</html>
